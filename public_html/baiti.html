      <script>
            const KiB_sekundes = 25000 / 8;

        <form>
            <label for="sekundes">Aprēķināt cik daudz informācijs var lejuplādēt</label>

            <br>
            <br><!-- <br> -->
            <input name="sekundes" id="sekundes" onfocus="document.querySelector('form').reset()"/>
            <label for="sekundes" value="">sekundēs, ja interneta ātrums ir 25mbps</label>
            <br>
            <br>
            <label for="atbilde">Atbilde:</label>
            <br>
             <br>
            <input name="atbilde" id="atbilde"/>
            <input name="vieniba" id="kib" type="radio" value="kib" onclick="atbilde.value = KB_sekundes * Number(sekundes.value)"/>
            <label for="kib">KiB</label>
            <input name="vieniba" id="kb" type="radio" value="kib" onclick="atbilde.value = KiB_sekundes * Number(sekundes.value)"/>
